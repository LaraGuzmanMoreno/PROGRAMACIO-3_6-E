<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularios</title>
</head>
<body>
    <a href="./index2.html">Volver a la página principal</a>
    <p>Este es un formulario de ejemplo.</p>
    <form>
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="last name">Apellido:</label>
        <input type="text" id="last name" name="last name"><br><br>
        <label for="fecha">Fecha de nacimiento:</label>
        <input type="date" id="fecha" name="fecha"><br><br>
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" name="email"><br><br>
        <label for="gender">Género:</label>
        <input type="checkbox" id="male" name="MASCULINO"><label for="male">Masculino</label>
        <input type="checkbox" id="female" name="FEMENINO"><label for="female">Femenino</label><br><br>
        <label for="profession">PROGRAMADOR:</label>
        <select name="profession" id="profession">
            <option value="">Elige una OPCION</option>
            <option value="">especialista en PYTHON</option>
            <option value="">especialista en JAVASCRIPT</option>
            <option value="">especialista en C++</option>
            <option value="">especialista en HTML</option>
        </select><br><br>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
